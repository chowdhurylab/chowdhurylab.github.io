    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-536G93B5" height="0" width="0" style="display: none; visibility: hidden"></iframe>
    </noscript>

    <div id="wrapper">
      <div id="main">
        <div class="inner">
          <header id="header">
            <a href="index.html" class="logo">
              <b class="publications-logo-text">ChowdhuryLab</b>
            </a>
          </header>

          <section>
            <header class="main">
              <h1 class="publications-page-title">Publications</h1>
              <p class="publications-page-subtitle">What we know</p>
            </header>
          </section>

          <div class="publications-filters" id="publications-filters" aria-label="Publication filters">
            <label class="publications-filter-item">
              <span class="publications-filter-label">Year</span>
              <select id="pub-filter-year" class="publications-filter-select">
                <option value="all">All years</option>
              </select>
            </label>

            <label class="publications-filter-item publications-search-wrap">
              <span class="publications-filter-label">Search</span>
              <input id="pub-filter-search" class="publications-filter-input" type="search" placeholder="Title, author, journal…" />
            </label>

            <div class="publications-filter-item publications-media-only">
              <input id="pub-filter-media" type="checkbox" />
              <label for="pub-filter-media">Has media links only</label>
            </div>

            <div class="publications-filter-item publications-type-chips" id="pub-filter-type" role="group" aria-label="Publication type filter">
              <button type="button" class="pub-type-chip is-active" data-type="all">All</button>
              <button type="button" class="pub-type-chip" data-type="Article">Article</button>
              <button type="button" class="pub-type-chip" data-type="Review Article">Review</button>
              <button type="button" class="pub-type-chip" data-type="Patent">Patent</button>
            </div>
          </div>

          <div id="publications-container" class="publications-container">
            <p class="publications-loading">Loading publications…</p>
          </div>
        </div>
      </div>
